<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реклама — Декабрь 2025</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        
        .login-screen h1 {
            margin-bottom: 30px;
        }
        
        .login-screen input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 250px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .login-screen input:focus {
            outline: none;
            border-color: #4ade80;
        }
        
        .login-screen button {
            background: #4ade80;
            color: #000;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .login-screen button:hover {
            background: #22c55e;
        }
        
        .login-error {
            color: #ef4444;
            margin-top: 15px;
        }
        
        .app-content {
            display: none;
        }
        
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .stats {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .stats span {
            color: #4ade80;
            font-weight: bold;
        }
        
        .sync-status {
            text-align: center;
            font-size: 12px;
            margin-bottom: 15px;
            padding: 5px 10px;
            border-radius: 5px;
            background: #0f172a;
        }
        
        .sync-status.syncing {
            color: #f59e0b;
        }
        
        .sync-status.synced {
            color: #4ade80;
        }
        
        .sync-status.error {
            color: #ef4444;
        }
        
        .filters {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .filters-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filters-row:last-child {
            margin-bottom: 0;
        }
        
        .filters label {
            font-size: 12px;
            color: #888;
            margin-right: 5px;
        }
        
        .filters select {
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        
        .filters select:focus {
            outline: none;
            border-color: #4ade80;
        }
        
        .contact {
            margin: 8px 0;
            background: #16213e;
            border-radius: 10px;
            transition: all 0.2s;
            overflow: hidden;
        }
        
        .move-buttons {
            display: flex;
            flex-direction: column;
            margin-right: 10px;
        }
        
        .btn-move {
            background: #334155;
            color: #888;
            border: none;
            padding: 2px 6px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 3px;
            margin: 1px 0;
        }
        
        .btn-move:hover {
            background: #4ade80;
            color: #000;
        }
        
        .contact.hidden {
            display: none;
        }
        
        .contact:hover {
            background: #1f3460;
        }
        
        .contact.done {
            background: #064e3b;
            border-left: 4px solid #4ade80;
        }
        
        .contact-header {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            cursor: pointer;
        }
        
        .checkbox {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #4ade80;
            flex-shrink: 0;
        }
        
        .number {
            color: #666;
            margin-right: 12px;
            font-size: 12px;
            min-width: 25px;
        }
        
        .contact-name-input {
            color: #60a5fa;
            font-size: 16px;
            font-weight: bold;
            flex-grow: 1;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 4px 8px;
            margin: -4px 0;
            min-width: 100px;
        }
        
        .contact-name-input:hover {
            border-color: #334155;
        }
        
        .contact-name-input:focus {
            outline: none;
            border-color: #4ade80;
            background: #0f172a;
        }
        
        .contact-status {
            font-size: 11px;
            margin-right: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            background: #334155;
            white-space: nowrap;
        }
        
        .btn-open-single {
            background: #3b82f6;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .btn-open-single:hover {
            background: #2563eb;
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 5px;
        }
        
        .btn-delete:hover {
            background: #dc2626;
        }
        
        .expand-icon {
            margin-left: 10px;
            font-size: 12px;
            color: #666;
            transition: transform 0.2s;
        }
        
        .contact.expanded .expand-icon {
            transform: rotate(180deg);
        }
        
        .contact-fields {
            display: none;
            padding: 0 15px 15px 15px;
            border-top: 1px solid #334155;
        }
        
        .contact.expanded .contact-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding-top: 15px;
        }
        
        .field {
            display: flex;
            flex-direction: column;
        }
        
        .field.full-width {
            grid-column: 1 / -1;
        }
        
        .field label {
            font-size: 11px;
            color: #888;
            margin-bottom: 3px;
        }
        
        .field input, .field select, .field textarea {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }
        
        .field textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .field input:focus, .field select:focus, .field textarea:focus {
            outline: none;
            border-color: #4ade80;
        }
        
        .field select {
            cursor: pointer;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-reset {
            background: #ef4444;
            color: white;
        }
        
        .btn-reset:hover {
            background: #dc2626;
        }
        
        .btn-save {
            background: #4ade80;
            color: #000;
        }
        
        .btn-save:hover {
            background: #22c55e;
        }
        
        .btn-import {
            background: #a855f7;
            color: white;
        }
        
        .btn-import:hover {
            background: #9333ea;
        }
        
        .btn-open {
            background: #3b82f6;
            color: white;
        }
        
        .btn-open:hover {
            background: #2563eb;
        }
        
        .btn-toggle {
            background: #64748b;
            color: white;
        }
        
        .btn-toggle:hover {
            background: #475569;
        }
        
        .btn-add {
            background: #10b981;
            color: white;
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 16px;
        }
        
        .btn-add:hover {
            background: #059669;
        }
        
        .btn-sync {
            background: #06b6d4;
            color: white;
        }
        
        .btn-sync:hover {
            background: #0891b2;
        }
        
        .progress {
            background: #333;
            border-radius: 10px;
            height: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #4ade80, #22c55e);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .progress.segmented { display: flex; background: #0f172a; }
        .progress-seg { height: 100%; transition: width 0.4s ease; }
        .progress-seg.todo { background: linear-gradient(90deg, #475569, #64748b); }
        .progress-seg.active { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .progress-seg.done { background: linear-gradient(90deg, #4ade80, #22c55e); }

        .stats-breakdown {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            font-size: 13px;
            color: #888;
            margin: 6px 0 14px;
        }
        .stats-breakdown .seg-stat { display: inline-flex; align-items: center; gap: 5px; }
        .stats-breakdown .seg-stat .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .stats-breakdown .seg-stat .num { color: #fff; font-weight: bold; }
        .stats-breakdown .todo-c .dot { background: #64748b; }
        .stats-breakdown .active-c .dot { background: #fbbf24; }
        .stats-breakdown .done-c .dot { background: #4ade80; }

        .status-icon {
            width: 13px;
            height: 13px;
            vertical-align: -2px;
            margin-right: 3px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
        .contact-status { display: inline-flex; align-items: center; }

        .drag-handle {
            cursor: grab;
            color: #475569;
            padding: 6px 4px;
            user-select: none;
            font-size: 16px;
            line-height: 1;
            touch-action: none;
            flex-shrink: 0;
        }
        .drag-handle:hover { color: #4ade80; }
        .drag-handle:active { cursor: grabbing; }
        .contact.sortable-ghost { opacity: 0.35; }
        .contact.sortable-chosen { background: #1f3460; }
        .contact.sortable-drag { box-shadow: 0 8px 20px rgba(0,0,0,0.5); }

        .card-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #334155;
        }
        .card-actions button {
            flex: 1;
            padding: 12px 10px;
            font-size: 14px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-copy-offer { background: #a855f7; color: white; }
        .btn-copy-offer:hover { background: #9333ea; }
        .btn-open-tg { background: #3b82f6; color: white; }
        .btn-open-tg:hover { background: #2563eb; }
        .btn-done { background: #4ade80; color: #000; }
        .btn-done:hover { background: #22c55e; }
        .contact.done .btn-done { background: #64748b; color: #fff; }
        .contact.done .btn-done:hover { background: #475569; }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #4ade80;
            color: #000;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 9999;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
            max-width: 90vw;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.err { background: #ef4444; color: #fff; }

        body.select-mode .contact-header { cursor: pointer; }
        body.select-mode .drag-handle { opacity: 0.3; pointer-events: none; }
        .contact.selected {
            background: #1e3a8a !important;
            outline: 2px solid #60a5fa;
            outline-offset: -2px;
        }
        .contact.selected.done { background: #1e3a8a !important; }

        .btn-select-mode { background: #6366f1; color: white; }
        .btn-select-mode:hover { background: #4f46e5; }
        body.select-mode .btn-select-mode { background: #ef4444; }

        .bulk-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e3a8a;
            color: white;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.45);
            transform: translateY(100%);
            transition: transform 0.25s ease;
            flex-wrap: wrap;
        }
        .bulk-bar.show { transform: translateY(0); }
        .bulk-bar .count { font-weight: bold; margin-right: auto; }
        .bulk-bar select, .bulk-bar button {
            padding: 9px 12px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .bulk-bar select { background: #fff; color: #000; }
        .bulk-bar .bulk-delete { background: #ef4444; color: white; }
        .bulk-bar .bulk-delete:hover { background: #dc2626; }
        .bulk-bar .bulk-close { background: transparent; color: white; font-size: 18px; padding: 6px 10px; }

        @media (max-width: 600px) {
            .contact.expanded .contact-fields {
                grid-template-columns: 1fr;
            }
            .controls {
                flex-direction: column;
            }
            .controls > button {
                width: 100%;
            }
            .filters-row {
                flex-direction: column;
                align-items: stretch;
            }
            .filters select {
                width: 100%;
            }
            .contact-header {
                display: grid;
                grid-template-columns: auto auto 1fr auto auto auto;
                grid-template-rows: auto auto;
                align-items: center;
                padding: 10px;
                gap: 5px 8px;
            }
            .move-buttons {
                grid-row: 1 / 3;
                flex-direction: column;
                margin-right: 0;
            }
            .btn-move {
                padding: 4px 6px;
                font-size: 10px;
            }
            .checkbox {
                grid-row: 1 / 3;
                width: 22px;
                height: 22px;
                margin-right: 0;
            }
            .number {
                grid-column: 3;
                grid-row: 1;
                margin-right: 0;
                font-size: 11px;
                color: #888;
            }
            .contact-name-input {
                grid-column: 3 / 7;
                grid-row: 1;
                font-size: 14px;
                padding: 2px 5px;
                margin-left: 25px;
            }
            .contact-status {
                grid-column: 3;
                grid-row: 2;
                display: inline-block;
                font-size: 11px;
                padding: 2px 6px;
                margin: 0;
            }
            .btn-open-single {
                grid-column: 4;
                grid-row: 2;
                padding: 4px 10px;
                font-size: 11px;
                margin: 0;
            }
            .btn-delete {
                grid-column: 5;
                grid-row: 2;
                padding: 4px 8px;
                font-size: 10px;
                margin: 0;
            }
            .expand-icon {
                grid-column: 6;
                grid-row: 1 / 3;
                margin-left: 0;
                font-size: 14px;
            }
            .card-actions { flex-direction: column; gap: 6px; }
            .card-actions button { width: 100%; padding: 14px; font-size: 16px; }
            .stats-breakdown { font-size: 11px; gap: 10px; }
            .bulk-bar { gap: 6px; padding: 10px; }
            .bulk-bar .count { width: 100%; margin-bottom: 4px; }
            .bulk-bar select, .bulk-bar button { font-size: 13px; padding: 8px 10px; flex: 1; }
            .toast { bottom: 100px; font-size: 14px; padding: 10px 18px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <!-- Экран входа -->
    <div class="login-screen" id="login-screen">
        <h1>🔐 Вход</h1>
        <input type="password" id="password-input" placeholder="Введите пароль" onkeypress="if(event.key==='Enter')checkPassword()">
        <button onclick="checkPassword()">Войти</button>
        <div class="login-error" id="login-error"></div>
    </div>
    
    <!-- Основное приложение -->
    <div class="app-content" id="app-content">
    <h1>📋 Реклама — Декабрь 2025</h1>
    
    <div class="sync-status" id="sync-status">⏳ Загрузка...</div>
    
    <div class="stats">
        Готово: <span id="done-count">0</span> / <span id="total-count">82</span> | Показано: <span id="shown-count">82</span>
    </div>

    <div class="progress segmented">
        <div class="progress-seg todo" id="progress-seg-todo"></div>
        <div class="progress-seg active" id="progress-seg-active"></div>
        <div class="progress-seg done" id="progress-seg-done"></div>
    </div>
    <div class="stats-breakdown">
        <span class="seg-stat todo-c"><span class="dot"></span>Надо написать: <span class="num" id="stat-todo">0</span></span>
        <span class="seg-stat active-c"><span class="dot"></span>В работе: <span class="num" id="stat-active">0</span></span>
        <span class="seg-stat done-c"><span class="dot"></span>Опубликовано: <span class="num" id="stat-done">0</span></span>
    </div>
    
    <div class="filters">
        <div class="filters-row">
            <label>🔍 Поиск:</label>
            <input type="text" id="search-input" placeholder="Поиск по всем полям..." oninput="applyFilters()" style="flex-grow: 1; background: #1e293b; border: 1px solid #334155; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 13px;">
        </div>
        <div class="filters-row">
            <label>Фильтр по статусу:</label>
            <select id="filter-status" onchange="applyFilters()">
                <option value="">Все</option>
                <option value="no-status">Без статуса</option>
                <option value="with-status">Только со статусами</option>
                <option value="написать">📝 Надо написать</option>
                <option value="написал">✉️ Написал</option>
                <option value="ответили">💬 Ответили</option>
                <option value="договорились">🤝 Договорились</option>
                <option value="скинуть_пост">📤 Скинуть пост</option>
                <option value="пост_скинул">📨 Пост скинул</option>
                <option value="ждет_оплату">💳 Ждёт оплату</option>
                <option value="ждем_публикацию">⏳ Ждём публикацию</option>
                <option value="оплачено">💰 Оплачено</option>
                <option value="опубликовано">✅ Опубликовано</option>
                <option value="отказ">❌ Отказ</option>
                <option value="мороз">🥶 Мороз</option>
                <option value="не_рабочий">🚫 Контакт не рабочий</option>
                <option value="отмена">⛔ Отмена</option>
            </select>
            
            <label style="margin-left: 15px;">Сортировка:</label>
            <select id="sort-by" onchange="applyFilters()">
                <option value="id">По номеру</option>
                <option value="status">По статусу</option>
                <option value="checked">Сначала непройденные</option>
                <option value="checked-reverse">Сначала пройденные</option>
            </select>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn-open" onclick="openNext5()">🚀 Открыть 5 непройденных</button>
        <button class="btn-toggle" onclick="toggleAll()">📂 Развернуть всё</button>
        <button class="btn-sync" onclick="syncNow()">🔄 Синхронизировать</button>
        <button class="btn-save" onclick="exportProgress()">💾 Скачать</button>
        <button class="btn-import" onclick="document.getElementById('importFile').click()">📂 Загрузить</button>
        <button class="btn-reset" onclick="resetAll()">🔄 Сбросить</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProgress(event)">
    </div>
    
    <div class="controls">
        <button class="btn-select-mode" id="select-mode-btn" onclick="toggleSelectMode()">☑️ Выбрать несколько</button>
        <button style="background: #22c55e; color: #000;" onclick="checkAllVisible()">☑️ Отметить все видимые</button>
        <button style="background: #f59e0b; color: #000;" onclick="uncheckAllVisible()">☐ Снять все видимые</button>
    </div>

    <div id="contacts-list"></div>

    <button class="btn-add" onclick="addNewContact()">➕ Добавить новую карточку</button>
    </div>

    <div class="bulk-bar" id="bulk-bar">
        <span class="count" id="bulk-count">0 выделено</span>
        <select id="bulk-status-select" onchange="if(this.value){bulkSetStatus(this.value);this.value='';}">
            <option value="">Сменить статус…</option>
            <option value="написать">Надо написать</option>
            <option value="написал">Написал</option>
            <option value="ответили">Ответили</option>
            <option value="договорились">Договорились</option>
            <option value="скинуть_пост">Скинуть пост</option>
            <option value="пост_скинул">Пост скинул</option>
            <option value="ждет_оплату">Ждёт оплату</option>
            <option value="ждем_публикацию">Ждём публикацию</option>
            <option value="оплачено">Оплачено</option>
            <option value="опубликовано">Опубликовано</option>
            <option value="отказ">Отказ</option>
            <option value="мороз">Мороз</option>
            <option value="не_рабочий">Не рабочий</option>
            <option value="отмена">Отмена</option>
        </select>
        <button class="bulk-delete" onclick="bulkDelete()">🗑️ Удалить</button>
        <button class="bulk-close" onclick="exitSelectMode()">✕</button>

                    const data = progressData[c.id] || {};
                    const searchFields = [
                        c.id,
                        c.name,
                        c.link,
                        data.customName || '',
                        data.customLink || '',
                        data.status || '',
                        data.price || '',
                        data.actualContact || '',
                        data.allContacts || '',
                        data.notes || '',
                        data.platforms || ''
                    ].join(' ').toLowerCase();
                    
                    return searchFields.includes(searchQuery);
                });
            }
            
            if (filterStatus === 'no-status') {
                filtered = filtered.filter(c => !progressData[c.id]?.status);
            } else if (filterStatus === 'with-status') {
                filtered = filtered.filter(c => progressData[c.id]?.status);
            } else if (filterStatus) {
                filtered = filtered.filter(c => progressData[c.id]?.status === filterStatus);
            }
            
            if (sortBy === 'status') {
                filtered.sort((a, b) => {
                    const statusA = progressData[a.id]?.status || '';
                    const statusB = progressData[b.id]?.status || '';
                    return statusOrder.indexOf(statusA) - statusOrder.indexOf(statusB);
                });
            } else if (sortBy === 'checked') {
                filtered.sort((a, b) => {
                    const checkedA = progressData[a.id]?.checked ? 1 : 0;
                    const checkedB = progressData[b.id]?.checked ? 1 : 0;
                    return checkedA - checkedB;
                });
            } else if (sortBy === 'checked-reverse') {
                filtered.sort((a, b) => {
                    const checkedA = progressData[a.id]?.checked ? 1 : 0;
                    const checkedB = progressData[b.id]?.checked ? 1 : 0;
                    return checkedB - checkedA;
                });
            }
            
            window.currentFilteredIds = filtered.map(c => c.id);
            
            renderContacts(filtered);
        }

        function toggleExpand(id, event) {
            const tag = event.target.tagName;
            if (tag === 'INPUT' || tag === 'SELECT' || tag === 'BUTTON' || tag === 'TEXTAREA' || tag === 'OPTION') return;
            if (event.target.classList.contains('drag-handle')) return;
            if (selectMode) {
                toggleCardSelection(id);
                return;
            }
            const contact = document.querySelector('.contact[data-id="' + id + '"]');
            contact.classList.toggle('expanded');
        }

        function toggleAll() {
            allExpanded = !allExpanded;
            const contacts = document.querySelectorAll('.contact');
            const btn = document.querySelector('.btn-toggle');
            
            contacts.forEach(contact => {
                if (allExpanded) {
                    contact.classList.add('expanded');
                } else {
                    contact.classList.remove('expanded');
                }
            });
            
            btn.textContent = allExpanded ? '📁 Свернуть всё' : '📂 Развернуть всё';
        }

        function toggleCheck(id) {
            if (!progressData[id]) progressData[id] = {};
            progressData[id].checked = !progressData[id].checked;
            
            const contact = document.querySelector('.contact[data-id="' + id + '"]');
            if (progressData[id].checked) {
                contact.classList.add('done');
            } else {
                contact.classList.remove('done');
            }
            
            updateStats();
            scheduleSaveToCloud();
        }

        function updateField(id, field, value) {
            if (!progressData[id]) progressData[id] = {};
            progressData[id][field] = value;
            
            if (field === 'status') {
                const contact = document.querySelector('.contact[data-id="' + id + '"]');
                const statusSpan = contact.querySelector('.contact-status');
                statusSpan.textContent = statusLabels[value] || '—';
            }
            
            scheduleSaveToCloud();
        }

        function openContact(id) {
            const contact = contactsData.find(c => c.id === id);
            const data = progressData[id] || {};
            const link = data.customLink || contact?.link || '';
            if (link) {
                window.open(link, '_blank');
            } else {
                alert('Ссылка не указана. Разверните карточку и добавьте ссылку.');
            }
        }

        function addNewContact() {
            let maxId = 0;
            contactsData.forEach(c => {
                const num = parseInt(c.id);
                if (num > maxId) maxId = num;
            });
            Object.keys(progressData).forEach(id => {
                const num = parseInt(id);
                if (num > maxId) maxId = num;
            });
            
            const newId = String(maxId + 1);
            
            contactsData.push({
                id: newId,
                name: "Новый контакт",
                link: "",
                isCustom: true
            });
            
            progressData[newId] = {
                checked: false,
                status: "написать",
                customName: "Новый контакт",
                isCustom: true
            };
            
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
            
            setTimeout(() => {
                const newContact = document.querySelector('.contact[data-id="' + newId + '"]');
                if (newContact) {
                    newContact.scrollIntoView({ behavior: 'smooth' });
                    newContact.classList.add('expanded');
                }
            }, 100);
        }

        function deleteContact(id) {
            if (!confirm('Удалить эту карточку?')) return;
            
            const index = contactsData.findIndex(c => c.id === id);
            if (index > -1) {
                contactsData.splice(index, 1);
            }
            
            delete progressData[id];
            
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
        }
        
        function applyContactsOrder(order) {
            contactsData.sort((a, b) => {
                const indexA = order.indexOf(a.id);
                const indexB = order.indexOf(b.id);
                if (indexA === -1) return 1;
                if (indexB === -1) return -1;
                return indexA - indexB;
            });
        }

        function exportProgress() {
            const customContacts = contactsData.filter(c => c.isCustom);
            const contactsOrder = contactsData.map(c => c.id);
            
            const data = {
                date: new Date().toISOString(),
                version: 3,
                contacts: progressData,
                customContacts: customContacts,
                contactsOrder: contactsOrder
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'progress_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importProgress(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (data.checked && Array.isArray(data.checked)) {
                        progressData = {};
                        data.checked.forEach(id => {
                            progressData[id] = { checked: true };
                        });
                    } else if (data.contacts) {
                        progressData = data.contacts;
                    }
                    
                    if (data.customContacts && Array.isArray(data.customContacts)) {
                        data.customContacts.forEach(c => {
                            if (!contactsData.find(existing => existing.id === c.id)) {
                                contactsData.push(c);
                            }
                        });
                    }
                    
                    if (data.contactsOrder && Array.isArray(data.contactsOrder)) {
                        applyContactsOrder(data.contactsOrder);
                    }
                    
                    scheduleSaveToCloud();
                    applyFilters();
                    updateStats();
                    
                    const doneCount = Object.values(progressData).filter(c => c && c.checked).length;
                    alert('✅ Прогресс загружен! Готово: ' + doneCount);
                } catch (err) {
                    alert('❌ Ошибка чтения файла: ' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function resetAll() {
            if (confirm('Точно сбросить весь прогресс? Все данные будут удалены!')) {
                progressData = {};
                contactsData = contactsData.filter(c => !c.isCustom);
                scheduleSaveToCloud();
                applyFilters();
                updateStats();
            }
        }

        function updateStats() {
            const total = contactsData.length || 1;
            const done = Object.values(progressData).filter(c => c && c.checked).length;
            document.getElementById('done-count').textContent = done;
            document.getElementById('total-count').textContent = contactsData.length;

            let cTodo = 0, cActive = 0, cDone = 0;
            contactsData.forEach(c => {
                const cat = statusCategory((progressData[c.id] || {}).status || '');
                if (cat === 'done') cDone++;
                else if (cat === 'active') cActive++;
                else cTodo++;
            });

            const pTodo = (cTodo / total * 100).toFixed(2);
            const pActive = (cActive / total * 100).toFixed(2);
            const pDone = (cDone / total * 100).toFixed(2);
            document.getElementById('progress-seg-todo').style.width = pTodo + '%';
            document.getElementById('progress-seg-active').style.width = pActive + '%';
            document.getElementById('progress-seg-done').style.width = pDone + '%';

            document.getElementById('stat-todo').textContent = cTodo;
            document.getElementById('stat-active').textContent = cActive;
            document.getElementById('stat-done').textContent = cDone;
        }

        function openNext5() {
            const uncheckedIds = contactsData
                .filter(c => !progressData[c.id]?.checked)
                .slice(0, 5);
            
            uncheckedIds.forEach(c => {
                const data = progressData[c.id] || {};
                const link = data.customLink || c.link;
                if (link) window.open(link, '_blank');
            });
        }
        
        function checkAllVisible() {
            const ids = window.currentFilteredIds || contactsData.map(c => c.id);
            if (!confirm('Отметить все ' + ids.length + ' видимых карточек как пройденные?')) return;
            
            ids.forEach(id => {
                if (!progressData[id]) progressData[id] = {};
                progressData[id].checked = true;
            });
            
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
        }
        
        function uncheckAllVisible() {
            const ids = window.currentFilteredIds || contactsData.map(c => c.id);
            if (!confirm('Снять галочки со всех ' + ids.length + ' видимых карточек?')) return;
            
            ids.forEach(id => {
                if (progressData[id]) {
                    progressData[id].checked = false;
                }
            });
            
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
        }

        // Перемещение карточек
        function moveContact(id, direction) {
            const index = contactsData.findIndex(c => c.id === id);
            if (index === -1) return;
            
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= contactsData.length) return;
            
            const temp = contactsData[index];
            contactsData[index] = contactsData[newIndex];
            contactsData[newIndex] = temp;
            
            scheduleSaveToCloud();
            applyFilters();
        }

        // ========== TOAST ==========
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.className = 'toast show' + (type === 'err' ? ' err' : '');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // ========== OFFER TEMPLATE ==========
        async function copyOffer(id) {
            try {
                await navigator.clipboard.writeText(OFFER_TEMPLATE);
                showToast('📋 Оффер скопирован в буфер');
            } catch (e) {
                const ta = document.createElement('textarea');
                ta.value = OFFER_TEMPLATE;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); showToast('📋 Оффер скопирован'); }
                catch (err) { showToast('❌ Не удалось скопировать', 'err'); }
                document.body.removeChild(ta);
            }
        }

        // ========== MARK DONE ==========
        function markDone(id) {
            if (!progressData[id]) progressData[id] = {};
            progressData[id].checked = !progressData[id].checked;
            const contact = document.querySelector('.contact[data-id="' + id + '"]');
            if (contact) {
                contact.classList.toggle('done', progressData[id].checked);
                const cb = contact.querySelector('.checkbox');
                if (cb) cb.checked = progressData[id].checked;
                const btn = contact.querySelector('.btn-done');
                if (btn) btn.textContent = progressData[id].checked ? '↩️ Не готово' : '✓ Готово';
            }
            scheduleSaveToCloud();
            updateStats();
        }

        // ========== MULTI-SELECT ==========
        function toggleSelectMode() {
            selectMode = !selectMode;
            document.body.classList.toggle('select-mode', selectMode);
            const btn = document.getElementById('select-mode-btn');
            btn.textContent = selectMode ? '✕ Отмена выбора' : '☑️ Выбрать несколько';
            if (!selectMode) {
                selectedIds.clear();
                updateBulkBar();
                applyFilters();
            }
            if (sortableInstance) sortableInstance.option('disabled', selectMode);
        }
        function exitSelectMode() {
            if (selectMode) toggleSelectMode();
        }
        function toggleCardSelection(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            const contact = document.querySelector('.contact[data-id="' + id + '"]');
            if (contact) contact.classList.toggle('selected', selectedIds.has(id));
            updateBulkBar();
        }
        function updateBulkBar() {
            const bar = document.getElementById('bulk-bar');
            const count = selectedIds.size;
            document.getElementById('bulk-count').textContent = count + ' выделено';
            bar.classList.toggle('show', count > 0);
        }
        function bulkSetStatus(newStatus) {
            if (selectedIds.size === 0) return;
            selectedIds.forEach(id => {
                if (!progressData[id]) progressData[id] = {};
                progressData[id].status = newStatus;
            });
            showToast('Статус "' + statusLabelClean(newStatus) + '" поставлен для ' + selectedIds.size);
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
        }
        function bulkDelete() {
            if (selectedIds.size === 0) return;
            if (!confirm('Удалить ' + selectedIds.size + ' карточек безвозвратно?')) return;
            const ids = Array.from(selectedIds);
            ids.forEach(id => {
                const idx = contactsData.findIndex(c => c.id === id);
                if (idx > -1) contactsData.splice(idx, 1);
                delete progressData[id];
            });
            selectedIds.clear();
            updateBulkBar();
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
            showToast('Удалено: ' + ids.length);
        }

        // ========== DRAG-N-DROP ==========
        function initSortable() {
            const container = document.getElementById('contacts-list');
            if (!container || typeof Sortable === 'undefined') return;
            if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
            sortableInstance = Sortable.create(container, {
                handle: '.drag-handle',
                animation: 200,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                dragClass: 'sortable-drag',
                disabled: selectMode,
                onEnd: handleReorder
            });
        }
        function handleReorder() {
            const visibleIds = Array.from(document.querySelectorAll('#contacts-list .contact')).map(el => el.dataset.id);
            const visibleSet = new Set(visibleIds);
            const idMap = Object.fromEntries(contactsData.map(c => [c.id, c]));
            let vIdx = 0;
            contactsData = contactsData.map(c => visibleSet.has(c.id) ? idMap[visibleIds[vIdx++]] : c);
            scheduleSaveToCloud();
            applyFilters();
        }

        // Инициализация приложения
        function initApp() {
            loadFromCloud().then(() => {
                applyFilters();
                updateStats();
            });
        }
        
        // Автозапуск если уже авторизован
        if (localStorage.getItem('tracker_auth') === 'true') {
            initApp();
        }
    </script>
</body>
</html>
