            const encoder = new TextEncoder();
            const data = encoder.encode(password + 'tracker_salt_2025');

            const hashArray = Array.from(new Uint8Array(hashBuffer));

            } catch (err) {
                console.error('Load from cloud error:', err);
                setSyncStatus('error', '❌ Ошибка загрузки: ' + err.message);
                return false;
            }
        }
        
        async function saveToCloud() {
            if (isSyncing) return;
            isSyncing = true;
            
            setSyncStatus('syncing', '⏳ Сохранение...');
            
            const customContacts = contactsData.filter(c => c.isCustom);
            const contactsOrder = contactsData.map(c => c.id);
            
            const data = {
                date: new Date().toISOString(),
                version: 3,
                contacts: progressData,
                customContacts: customContacts,
                contactsOrder: contactsOrder
            };
            
            try {
                const response = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                setSyncStatus('synced', '✅ Сохранено ' + new Date().toLocaleTimeString());
            } catch (err) {
                console.error('Save to cloud error:', err);
                setSyncStatus('error', '❌ Ошибка сохранения');
            }
            
            isSyncing = false;
        }
        
        function scheduleSaveToCloud() {
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(saveToCloud, 1000);
        }
        
        function syncNow() {
            loadFromCloud().then(() => {
                applyFilters();
                updateStats();
            });
        }

        // ========== ОСНОВНЫЕ ФУНКЦИИ ==========
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function renderContacts(filteredData = null) {
            const container = document.getElementById('contacts-list');
            container.innerHTML = '';
            
            const dataToRender = filteredData || contactsData;
            let shownCount = 0;
            
            dataToRender.forEach((c, index) => {
                const data = progressData[c.id] || {};
                const isChecked = data.checked || false;
                const statusText = statusLabels[data.status || ''] || '—';
                const displayName = escapeHtml(data.customName || c.name);
                const displayLink = escapeHtml(data.customLink || c.link);
                shownCount++;
                
                const isFirst = index === 0;
                const isLast = index === dataToRender.length - 1;
                
                let deleteBtn = '<button class="btn-delete" onclick="event.stopPropagation(); deleteContact(\'' + c.id + '\')">✕</button>';
                
                const html = 
                    '<div class="contact ' + (isChecked ? 'done' : '') + '" data-id="' + c.id + '">' +
                        '<div class="contact-header" onclick="toggleExpand(\'' + c.id + '\', event)">' +
                            '<div class="move-buttons">' +
                                '<button class="btn-move" ' + (isFirst ? 'disabled style="opacity:0.3"' : '') + ' onclick="event.stopPropagation(); moveContact(\'' + c.id + '\', -1)" title="Вверх">▲</button>' +
                                '<button class="btn-move" ' + (isLast ? 'disabled style="opacity:0.3"' : '') + ' onclick="event.stopPropagation(); moveContact(\'' + c.id + '\', 1)" title="Вниз">▼</button>' +
                            '</div>' +
                            '<input type="checkbox" class="checkbox" ' + (isChecked ? 'checked' : '') + ' onclick="event.stopPropagation()" onchange="toggleCheck(\'' + c.id + '\')">' +
                            '<span class="number">' + (index + 1) + '</span>' +
                            '<input type="text" class="contact-name-input" value="' + displayName + '" onclick="event.stopPropagation()" onchange="updateField(\'' + c.id + '\', \'customName\', this.value)">' +
                            '<span class="contact-status">' + statusText + '</span>' +
                            '<button class="btn-open-single" onclick="event.stopPropagation(); openContact(\'' + c.id + '\')">Открыть</button>' +
                            deleteBtn +
                            '<span class="expand-icon">▼</span>' +
                        '</div>' +
                        '<div class="contact-fields">' +
                            '<div class="field">' +
                                '<label>Статус</label>' +
                                '<select onchange="updateField(\'' + c.id + '\', \'status\', this.value)">' +
                                    '<option value=""' + (!data.status ? ' selected' : '') + '>—</option>' +
                                    '<option value="написать"' + (data.status === 'написать' ? ' selected' : '') + '>📝 Надо написать</option>' +
                                    '<option value="написал"' + (data.status === 'написал' ? ' selected' : '') + '>✉️ Написал</option>' +
                                    '<option value="ответили"' + (data.status === 'ответили' ? ' selected' : '') + '>💬 Ответили</option>' +
                                    '<option value="договорились"' + (data.status === 'договорились' ? ' selected' : '') + '>🤝 Договорились</option>' +
                                    '<option value="скинуть_пост"' + (data.status === 'скинуть_пост' ? ' selected' : '') + '>📤 Скинуть пост</option>' +
                                    '<option value="пост_скинул"' + (data.status === 'пост_скинул' ? ' selected' : '') + '>📨 Пост скинул</option>' +
                                    '<option value="ждет_оплату"' + (data.status === 'ждет_оплату' ? ' selected' : '') + '>💳 Ждёт оплату</option>' +
                                    '<option value="ждем_публикацию"' + (data.status === 'ждем_публикацию' ? ' selected' : '') + '>⏳ Ждём публикацию</option>' +
                                    '<option value="оплачено"' + (data.status === 'оплачено' ? ' selected' : '') + '>💰 Оплачено</option>' +
                                    '<option value="опубликовано"' + (data.status === 'опубликовано' ? ' selected' : '') + '>✅ Опубликовано</option>' +
                                    '<option value="отказ"' + (data.status === 'отказ' ? ' selected' : '') + '>❌ Отказ</option>' +
                                    '<option value="мороз"' + (data.status === 'мороз' ? ' selected' : '') + '>🥶 Мороз</option>' +
                                    '<option value="не_рабочий"' + (data.status === 'не_рабочий' ? ' selected' : '') + '>🚫 Контакт не рабочий</option>' +
                                    '<option value="отмена"' + (data.status === 'отмена' ? ' selected' : '') + '>⛔ Отмена</option>' +
                                '</select>' +
                            '</div>' +
                            '<div class="field">' +
                                '<label>Цена</label>' +
                                '<input type="text" placeholder="напр. $100 или 5000₽" value="' + escapeHtml(data.price || '') + '" onchange="updateField(\'' + c.id + '\', \'price\', this.value)">' +
                            '</div>' +
                            '<div class="field">' +
                                '<label>Актуальный контакт</label>' +
                                '<input type="text" placeholder="@username" value="' + escapeHtml(data.actualContact || '') + '" onchange="updateField(\'' + c.id + '\', \'actualContact\', this.value)">' +
                            '</div>' +
                            '<div class="field">' +
                                '<label>Все контакты</label>' +
                                '<input type="text" placeholder="@user1, @user2..." value="' + escapeHtml(data.allContacts || '') + '" onchange="updateField(\'' + c.id + '\', \'allContacts\', this.value)">' +
                            '</div>' +
                            '<div class="field">' +
                                '<label>Заметки</label>' +
                                '<input type="text" placeholder="любые заметки..." value="' + escapeHtml(data.notes || '') + '" onchange="updateField(\'' + c.id + '\', \'notes\', this.value)">' +
                            '</div>' +
                            '<div class="field full-width">' +
                                '<label>Ссылка для кнопки "Открыть"</label>' +
                                '<input type="text" placeholder="https://t.me/username" value="' + displayLink + '" onchange="updateField(\'' + c.id + '\', \'customLink\', this.value)">' +
                            '</div>' +
                            '<div class="field full-width">' +
                                '<label>Площадки</label>' +
                                '<textarea placeholder="каналы, боты, чаты..." onchange="updateField(\'' + c.id + '\', \'platforms\', this.value)">' + escapeHtml(data.platforms || '') + '</textarea>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                container.innerHTML += html;
            });
            
            document.getElementById('shown-count').textContent = shownCount;
        }

        function applyFilters() {
            const filterStatus = document.getElementById('filter-status').value;
            const sortBy = document.getElementById('sort-by').value;
            const searchInput = document.getElementById('search-input');
            const searchQuery = searchInput ? searchInput.value.toLowerCase().trim() : '';
            
            let filtered = [...contactsData];
            
            if (searchQuery) {
                filtered = filtered.filter(c => {
                    const data = progressData[c.id] || {};
                    const searchFields = [
                        c.id,
                        c.name,
                        c.link,
                        data.customName || '',
                        data.customLink || '',
                        data.status || '',
                        data.price || '',
                        data.actualContact || '',
                        data.allContacts || '',
                        data.notes || '',
                        data.platforms || ''
                    ].join(' ').toLowerCase();
                    
                    return searchFields.includes(searchQuery);
                });
            }
            
            if (filterStatus === 'no-status') {
                filtered = filtered.filter(c => !progressData[c.id]?.status);
            } else if (filterStatus === 'with-status') {
                filtered = filtered.filter(c => progressData[c.id]?.status);
            } else if (filterStatus) {
                filtered = filtered.filter(c => progressData[c.id]?.status === filterStatus);
            }
            
            if (sortBy === 'status') {
                filtered.sort((a, b) => {
                    const statusA = progressData[a.id]?.status || '';
                    const statusB = progressData[b.id]?.status || '';
                    return statusOrder.indexOf(statusA) - statusOrder.indexOf(statusB);
                });
            } else if (sortBy === 'checked') {
                filtered.sort((a, b) => {
                    const checkedA = progressData[a.id]?.checked ? 1 : 0;
                    const checkedB = progressData[b.id]?.checked ? 1 : 0;
                    return checkedA - checkedB;
                });
            } else if (sortBy === 'checked-reverse') {
                filtered.sort((a, b) => {
                    const checkedA = progressData[a.id]?.checked ? 1 : 0;
                    const checkedB = progressData[b.id]?.checked ? 1 : 0;
                    return checkedB - checkedA;
                });
            }
            
            window.currentFilteredIds = filtered.map(c => c.id);
            
            renderContacts(filtered);
        }

        function toggleExpand(id, event) {
            if (event.target.classList.contains('checkbox') || 
                event.target.classList.contains('btn-open-single') ||
                event.target.classList.contains('btn-delete') ||
                event.target.classList.contains('btn-move') ||
                event.target.classList.contains('contact-name-input')) {
                return;
            }
            const contact = document.querySelector('.contact[data-id="' + id + '"]');
            contact.classList.toggle('expanded');
        }

        function toggleAll() {
            allExpanded = !allExpanded;
            const contacts = document.querySelectorAll('.contact');
            const btn = document.querySelector('.btn-toggle');
            
            contacts.forEach(contact => {
                if (allExpanded) {
                    contact.classList.add('expanded');
                } else {
                    contact.classList.remove('expanded');
                }
            });
            
            btn.textContent = allExpanded ? '📁 Свернуть всё' : '📂 Развернуть всё';
        }

        function toggleCheck(id) {
            if (!progressData[id]) progressData[id] = {};
            progressData[id].checked = !progressData[id].checked;
            
            const contact = document.querySelector('.contact[data-id="' + id + '"]');
            if (progressData[id].checked) {
                contact.classList.add('done');
            } else {
                contact.classList.remove('done');
            }
            
            updateStats();
            scheduleSaveToCloud();
        }

        function updateField(id, field, value) {
            if (!progressData[id]) progressData[id] = {};
            progressData[id][field] = value;
            
            if (field === 'status') {
                const contact = document.querySelector('.contact[data-id="' + id + '"]');
                const statusSpan = contact.querySelector('.contact-status');
                statusSpan.textContent = statusLabels[value] || '—';
            }
            
            scheduleSaveToCloud();
        }

        function openContact(id) {
            const contact = contactsData.find(c => c.id === id);
            const data = progressData[id] || {};
            const link = data.customLink || contact?.link || '';
            if (link) {
                window.open(link, '_blank');
            } else {
                alert('Ссылка не указана. Разверните карточку и добавьте ссылку.');
            }
        }

        function addNewContact() {
            let maxId = 0;
            contactsData.forEach(c => {
                const num = parseInt(c.id);
                if (num > maxId) maxId = num;
            });
            Object.keys(progressData).forEach(id => {
                const num = parseInt(id);
                if (num > maxId) maxId = num;
            });
            
            const newId = String(maxId + 1);
            
            contactsData.push({
                id: newId,
                name: "Новый контакт",
                link: "",
                isCustom: true
            });
            
            progressData[newId] = {
                checked: false,
                status: "написать",
                customName: "Новый контакт",
                isCustom: true
            };
            
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
            
            setTimeout(() => {
                const newContact = document.querySelector('.contact[data-id="' + newId + '"]');
                if (newContact) {
                    newContact.scrollIntoView({ behavior: 'smooth' });
                    newContact.classList.add('expanded');
                }
            }, 100);
        }

        function deleteContact(id) {
            if (!confirm('Удалить эту карточку?')) return;
            
            const index = contactsData.findIndex(c => c.id === id);
            if (index > -1) {
                contactsData.splice(index, 1);
            }
            
            delete progressData[id];
            
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
        }
        
        function applyContactsOrder(order) {
            contactsData.sort((a, b) => {
                const indexA = order.indexOf(a.id);
                const indexB = order.indexOf(b.id);
                if (indexA === -1) return 1;
                if (indexB === -1) return -1;
                return indexA - indexB;
            });
        }

        function exportProgress() {
            const customContacts = contactsData.filter(c => c.isCustom);
            const contactsOrder = contactsData.map(c => c.id);
            
            const data = {
                date: new Date().toISOString(),
                version: 3,
                contacts: progressData,
                customContacts: customContacts,
                contactsOrder: contactsOrder
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'progress_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importProgress(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (data.checked && Array.isArray(data.checked)) {
                        progressData = {};
                        data.checked.forEach(id => {
                            progressData[id] = { checked: true };
                        });
                    } else if (data.contacts) {
                        progressData = data.contacts;
                    }
                    
                    if (data.customContacts && Array.isArray(data.customContacts)) {
                        data.customContacts.forEach(c => {
                            if (!contactsData.find(existing => existing.id === c.id)) {
                                contactsData.push(c);
                            }
                        });
                    }
                    
                    if (data.contactsOrder && Array.isArray(data.contactsOrder)) {
                        applyContactsOrder(data.contactsOrder);
                    }
                    
                    scheduleSaveToCloud();
                    applyFilters();
                    updateStats();
                    
                    const doneCount = Object.values(progressData).filter(c => c && c.checked).length;
                    alert('✅ Прогресс загружен! Готово: ' + doneCount);
                } catch (err) {
                    alert('❌ Ошибка чтения файла: ' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function resetAll() {
            if (confirm('Точно сбросить весь прогресс? Все данные будут удалены!')) {
                progressData = {};
                contactsData = contactsData.filter(c => !c.isCustom);
                scheduleSaveToCloud();
                applyFilters();
                updateStats();
            }
        }

        function updateStats() {
            const total = contactsData.length;
            const done = Object.values(progressData).filter(c => c && c.checked).length;
            
            document.getElementById('done-count').textContent = done;
            document.getElementById('total-count').textContent = total;
            document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
        }

        function openNext5() {
            const uncheckedIds = contactsData
                .filter(c => !progressData[c.id]?.checked)
                .slice(0, 5);
            
            uncheckedIds.forEach(c => {
                const data = progressData[c.id] || {};
                const link = data.customLink || c.link;
                if (link) window.open(link, '_blank');
            });
        }
        
        function checkAllVisible() {
            const ids = window.currentFilteredIds || contactsData.map(c => c.id);
            if (!confirm('Отметить все ' + ids.length + ' видимых карточек как пройденные?')) return;
            
            ids.forEach(id => {
                if (!progressData[id]) progressData[id] = {};
                progressData[id].checked = true;
            });
            
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
        }
        
        function uncheckAllVisible() {
            const ids = window.currentFilteredIds || contactsData.map(c => c.id);
            if (!confirm('Снять галочки со всех ' + ids.length + ' видимых карточек?')) return;
            
            ids.forEach(id => {
                if (progressData[id]) {
                    progressData[id].checked = false;
                }
            });
            
            scheduleSaveToCloud();
            applyFilters();
            updateStats();
        }

        // Перемещение карточек
        function moveContact(id, direction) {
            const index = contactsData.findIndex(c => c.id === id);
            if (index === -1) return;
            
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= contactsData.length) return;
            
            const temp = contactsData[index];
            contactsData[index] = contactsData[newIndex];
            contactsData[newIndex] = temp;
            
            scheduleSaveToCloud();
            applyFilters();
        }

        // Инициализация приложения
        function initApp() {
            loadFromCloud().then(() => {
                applyFilters();
                updateStats();
            });
        }
        
        // Автозапуск если уже авторизован
        if (localStorage.getItem('tracker_auth') === 'true') {
            initApp();
        }
    </script>
</body>
